name: Sanity
on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GTEST_OUTPUT: xml:./
jobs:
  what-to-make:
    runs-on: ubuntu-slim
    outputs:
      make-core: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.core-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-android: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.android-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-cli: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.cli-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-daemon: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.daemon-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-dist: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.dist-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-docs: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.docs-changed == '1' }}
      make-gtk: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.gtk-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-mac: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.mac-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-qt: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.qt-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-source-tarball: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.any-code-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-tests: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.tests-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-utils: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.utils-changed == '1' || steps.check-diffs.outputs.tests-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      make-web: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.web-changed == '1' }}
      test-style: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.our-code-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' }}
      tidy-core: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.tidy-core-src-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' || steps.check-diffs.outputs.tidy-config-changed == '1' }}
      tidy-gtk: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.tidy-gtk-src-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' || steps.check-diffs.outputs.tidy-config-changed == '1' }}
      tidy-qt: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.tidy-qt-src-changed == '1' || steps.check-diffs.outputs.ci-actions-changed == '1' || steps.check-diffs.outputs.tidy-config-changed == '1' }}
      tidy-everything: ${{ steps.check-main-push.outputs.is-main-push == '1' || steps.check-diffs.outputs.tidy-config-changed == '1' }}
    steps:
      - name: Check Push to Main Branch
        id: check-main-push
        run: |
          set -x
          if [ "$GITHUB_EVENT_NAME" = 'push' ] && [ "$GITHUB_REF_NAME" = 'main' ]; then
            echo is-main-push=1 >> "$GITHUB_OUTPUT"
          else
            echo is-main-push=0 >> "$GITHUB_OUTPUT"
          fi
      - name: Get Source
        id: get-source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: src
          submodules: recursive
      - name: Check for diffs
        id: check-diffs
        run: |
          set +e
          cd src
          MERGE_BASE=`git merge-base origin/main HEAD`
          function get_changes() { # name, paths...
            local name="$1"
            shift
            git diff --exit-code "$MERGE_BASE" -- "$@"
            echo "$name-changed=$?" >> "$GITHUB_OUTPUT"
          }
          get_changes core       CMakeLists.txt cmake third-party libtransmission libtransmission-app
          get_changes android    CMakeLists.txt cmake third-party libtransmission android
          get_changes cli        CMakeLists.txt cmake Transmission.xcodeproj third-party libtransmission cli
          get_changes any-code   CMakeLists.txt cmake Transmission.xcodeproj libtransmission libtransmission-app cli daemon gtk macosx qt utils tests web third-party
          get_changes our-code   CMakeLists.txt cmake Transmission.xcodeproj libtransmission libtransmission-app cli daemon gtk macosx qt utils tests web
          get_changes tidy-config libtransmission/.clang-tidy libtransmission-app/.clang-tidy gtk/.clang-tidy qt/.clang-tidy tests/libtransmission/.clang-tidy tests/qt/.clang-tidy
          # clang-tidy-diff only inspects changed lines, so each tidy cell keys
          # off just the directories its -regex matches -- not the wider build
          # deps (a libtransmission-only change has no gtk/qt lines to check).
          get_changes tidy-core-src libtransmission libtransmission-app tests/libtransmission
          get_changes tidy-gtk-src  gtk
          get_changes tidy-qt-src   qt tests/qt
          get_changes daemon     CMakeLists.txt cmake Transmission.xcodeproj third-party libtransmission daemon
          get_changes dist       dist release
          get_changes docs       docs
          get_changes gtk        CMakeLists.txt cmake third-party libtransmission libtransmission-app gtk
          get_changes mac        CMakeLists.txt cmake Transmission.xcodeproj third-party libtransmission macosx
          get_changes qt         CMakeLists.txt cmake third-party libtransmission libtransmission-app qt
          get_changes tests      CMakeLists.txt cmake third-party libtransmission libtransmission-app utils tests
          get_changes utils      CMakeLists.txt cmake third-party libtransmission utils
          get_changes web        CMakeLists.txt cmake web
          get_changes ci-actions .github/workflows/actions.yml .github/actions release
          cat "$GITHUB_OUTPUT"

  code-style:
    runs-on: ubuntu-26.04
    needs: [ what-to-make ]
    if: ${{ needs.what-to-make.outputs.test-style == 'true' }}
    steps:
      - name: Show Configuration
        run: |
          echo '${{ toJSON(needs) }}'
          echo '${{ toJSON(runner) }}'
          cat /etc/os-release
      - name: Get Source
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Check for style diffs
        id: check-for-diffs
        working-directory: .
        run: |
          ./code_style.sh --force
          set +e
          git diff --exit-code > style.diff
          echo "differs=$?" >> $GITHUB_OUTPUT
          cat style.diff
          set -e
      - name: Upload Diffs
        uses: actions/upload-artifact@v6
        if: ${{ steps.check-for-diffs.outputs.differs == '1' }}
        with:
          name: code-style.diff
          path: 'style.diff'
      - name: Fail if diffs exist
        if: ${{ steps.check-for-diffs.outputs.differs == '1' }}
        run: |
          echo "code style does not match expected."
          cat style.diff
          echo "When CI is done, the above patch will be uploaded as 'code-style.diff' to https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/ ."
          exit 1

  sanitizer-tests-linux:
    runs-on: ubuntu-latest
    needs: [ what-to-make ]
    if: ${{ needs.what-to-make.outputs.make-tests == 'true' }}
    steps:
      - name: Show Configuration
        run: |
          echo '${{ toJSON(needs) }}'
          echo '${{ toJSON(runner) }}'
          cat /etc/os-release
      - name: Get Source
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Get Dependencies
        uses: ./.github/actions/install-deps
        with:
          compiler: clang
          enable-debugging: true
          enable-qt: qt6
          use-sudo: true
      - name: Configure
        run: |
          cmake \
            -S . \
            -B obj \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER='clang++' \
            -DCMAKE_CXX_FLAGS='-gdwarf-4 -fno-omit-frame-pointer -fsanitize=address,leak,undefined' \
            -DCMAKE_C_COMPILER='clang' \
            -DCMAKE_C_FLAGS='-gdwarf-4 -fno-omit-frame-pointer -fsanitize=address,leak,undefined' \
            -DCMAKE_INSTALL_PREFIX=pfx \
            -DENABLE_CLI=OFF \
            -DENABLE_DAEMON=OFF \
            -DENABLE_GTK=OFF \
            -DENABLE_MAC=OFF \
            -DENABLE_QT=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_UTILS=ON \
            -DREBUILD_WEB=OFF \
            -DRUN_CLANG_TIDY=OFF \
            -DUSE_SYSTEM_DEFAULT=ON \
            -DUSE_SYSTEM_DHT=OFF `# Not packaged in Ubuntu` \
            -DUSE_SYSTEM_SIGSLOT=OFF `# Not packaged in Ubuntu` \
            -DUSE_SYSTEM_SMALL=OFF `# Not packaged in Ubuntu` \
            -DUSE_SYSTEM_UTP=OFF `# Not packaged in Ubuntu` \
            -DUSE_SYSTEM_WIDE_INTEGER=OFF `# Not packaged in Ubuntu`
      - name: Make
        run: cmake --build obj --config Debug --target all-tests
      - name: Test with sanitizers
        uses: ./.github/actions/run-tests
        with:
          build-dir: obj
          build-config: Debug
          enable-sanitizers: true
          # disable container-overflow reports to avoid false errors
          # that are caused by Qt libraries not being asan instrumented
          extra-asan-options: detect_container_overflow=0

  sanitizer-tests-macos:
    runs-on: macos-26
    needs: [ what-to-make ]
    if: ${{ needs.what-to-make.outputs.make-tests == 'true' }}
    steps:
      - name: Show Configuration
        run: |
          echo '${{ toJSON(needs) }}'
          echo '${{ toJSON(runner) }}'
          sw_vers
      - name: Get Source
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Get Dependencies
        uses: ./.github/actions/install-deps
        with:
          compiler: clang
      - name: Configure
        run: |
          cmake \
            -S . \
            -B obj \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS='-gdwarf-4 -fno-omit-frame-pointer -fsanitize=address,undefined' \
            -DCMAKE_C_FLAGS='-gdwarf-4 -fno-omit-frame-pointer -fsanitize=address,undefined' \
            -DCMAKE_INSTALL_PREFIX=pfx \
            -DENABLE_CLI=OFF \
            -DENABLE_DAEMON=OFF \
            -DENABLE_GTK=OFF \
            -DENABLE_MAC=OFF \
            -DENABLE_QT=OFF \
            -DENABLE_TESTS=ON \
            -DENABLE_UTILS=ON \
            -DREBUILD_WEB=OFF \
            -DRUN_CLANG_TIDY=OFF \
            -DUSE_SYSTEM_DEFAULT=ON \
            -DUSE_SYSTEM_DHT=OFF `# Not packaged in Homebrew` \
            -DUSE_SYSTEM_SIGSLOT=OFF `# Not packaged in Homebrew` \
            -DUSE_SYSTEM_SMALL=OFF `# Not packaged in Homebrew` \
            -DUSE_SYSTEM_UTP=OFF `# Not packaged in Homebrew` \
            -DUSE_SYSTEM_WIDE_INTEGER=OFF `# Not packaged in Homebrew`
      - name: Make
        run: cmake --build obj --config Debug --target all-tests
      - name: Test with sanitizers
        uses: ./.github/actions/run-tests
        with:
          build-dir: obj
          build-config: Debug
          enable-sanitizers: true

  sanitizer-tests-windows:
    runs-on: windows-2022
    needs: [ what-to-make ]
    if: ${{ needs.what-to-make.outputs.make-tests == 'true' }}
    steps:
      - name: Show Configuration
        run: |
          echo '${{ toJSON(needs) }}'
          echo '${{ toJSON(runner) }}'
      - name: Get Source
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Prepare Build Deps
        uses: ./.github/actions/prepare-deps-win32
        with:
          arch: x64
          type: Deps
      - name: Setup Visual Studio Environment
        uses: ./.github/actions/setup-vs-env-win32
        with:
          arch: x64
      - name: Configure
        env:
          # MSVC AddressSanitizer is address-only (no leak/undefined sanitizers).
          # Disable STL container annotations: the prebuilt Qt libraries are not
          # ASan-instrumented, so annotated std::string/std::vector trip LNK2038
          # 'annotate_string'/'annotate_vector' mismatches at link time.
          # Set via CFLAGS/CXXFLAGS to seed CMAKE_*_FLAGS without escaping spaces
          # through the PowerShell -> cmd -> cmake invocation below.
          CFLAGS: /fsanitize=address /D_DISABLE_STRING_ANNOTATION /D_DISABLE_VECTOR_ANNOTATION
          CXXFLAGS: /fsanitize=address /D_DISABLE_STRING_ANNOTATION /D_DISABLE_VECTOR_ANNOTATION
        run: |
          $CmakeArgs = @(
            '-S .'
            '-B obj'
            '-G Ninja'
            # RelWithDebInfo avoids Debug's /RTC1, which is incompatible with ASan.
            '-DCMAKE_BUILD_TYPE=RelWithDebInfo'
            "-DCMAKE_PREFIX_PATH=`"$Env:DEPS_PREFIX`""
            '-DENABLE_CLI=OFF'
            '-DENABLE_DAEMON=OFF'
            '-DENABLE_GTK=OFF'
            '-DENABLE_MAC=OFF'
            # Qt must be ON so the Qt unit tests are built and exercised under ASan.
            '-DENABLE_QT=ON'
            '-DENABLE_TESTS=ON'
            '-DENABLE_UTILS=ON'
            '-DREBUILD_WEB=OFF'
            '-DRUN_CLANG_TIDY=OFF'
            '-DUSE_SYSTEM_DEFAULT=OFF'
          )
          cmd /c "`"$Env:VCVARSALL`" $Env:VC_ARCH >nul && cmake $($CmakeArgs -join ' ')"
      - name: Make
        run: |
          cmd /c "`"$Env:VCVARSALL`" $Env:VC_ARCH >nul && cmake --build obj --config RelWithDebInfo --target all-tests"
      - name: Configure AddressSanitizer runtime
        run: |
          # The ASan runtime DLL ships with the MSVC toolchain; ctest runs outside
          # the vcvarsall environment, so expose its directory to later steps.
          $AsanDll = cmd /c "`"$Env:VCVARSALL`" $Env:VC_ARCH >nul && where clang_rt.asan_dynamic-x86_64.dll" | Select-Object -First 1
          if (-not $AsanDll) { throw 'Could not locate the AddressSanitizer runtime DLL' }
          $AsanDir = Split-Path $AsanDll
          Write-Host "AddressSanitizer runtime: $AsanDir"
          $AsanDir | Out-File $Env:GITHUB_PATH -Append

          # Point ASan at a native-path llvm-symbolizer so stacks are fully
          # symbolized (otherwise the runtime logs 'Failed to use and restart
          # external symbolizer!'). set-test-env honors this pre-set path.
          $found = cmd /c "`"$Env:VCVARSALL`" $Env:VC_ARCH >nul && where llvm-symbolizer.exe 2>nul" | Select-Object -First 1
          $Symbolizer = @($found, 'C:\Program Files\LLVM\bin\llvm-symbolizer.exe') |
            Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if ($Symbolizer) {
            Write-Host "ASan symbolizer: $Symbolizer"
            "ASAN_SYMBOLIZER_PATH=$Symbolizer" | Out-File $Env:GITHUB_ENV -Append
            "LLVM_SYMBOLIZER_PATH=$Symbolizer" | Out-File $Env:GITHUB_ENV -Append
          } else {
            Write-Host '::warning::llvm-symbolizer.exe not found; ASan stacks may be partially symbolized.'
          }
      - name: Test with AddressSanitizer
        uses: ./.github/actions/run-tests
        with:
          build-config: RelWithDebInfo
          build-dir: obj
          enable-asan: true
          extra-asan-options: allocator_may_return_null=0
          timeout: 600

  clang-tidy-linux:
    runs-on: ${{ matrix.runner }}
    needs: what-to-make
    if: |
      needs.what-to-make.outputs.tidy-core == 'true' ||
      needs.what-to-make.outputs.tidy-gtk == 'true' ||
      needs.what-to-make.outputs.tidy-qt == 'true'
    # One cell per toolkit version. clang-tidy-diff.py checks only the lines
    # changed since the merge base, so each cell needs to generate code (Qt moc/
    # uic) but never compiles the whole target. The matrix.enabled flag (wired to
    # the what-to-make tidy-* outputs) skips cells whose area did not change.
    # TODO: try removing '-DFMT_USE_CONSTEVAL=0' either when upgrading clang or fmt
    strategy:
      fail-fast: false
      matrix:
        toolkit: [core, gtk3, gtk4, qt5, qt6]
        include:
          - toolkit: core
            enable-gtk: false
            enable-qt: false
            enable-tests: true
            enabled: ${{ needs.what-to-make.outputs.tidy-core }}
            regex: '(libtransmission|libtransmission-app|tests/libtransmission)/.*'
            runner: ubuntu-latest
          - toolkit: gtk3
            enable-gtk: gtk3
            enable-qt: false
            enable-tests: false
            enabled: ${{ needs.what-to-make.outputs.tidy-gtk }}
            regex: 'gtk/.*'
            runner: ubuntu-latest
          - toolkit: gtk4
            enable-gtk: gtk4
            enable-qt: false
            enable-tests: false
            enabled: ${{ needs.what-to-make.outputs.tidy-gtk }}
            regex: 'gtk/.*'
            runner: ubuntu-26.04 # 24.04 doesn't have GTKMM4_MINIMUM
          - toolkit: qt5
            enable-gtk: false
            enable-qt: qt5
            enable-tests: true
            enabled: ${{ needs.what-to-make.outputs.tidy-qt }}
            regex: '(qt|tests/qt)/.*'
            runner: ubuntu-latest
          - toolkit: qt6
            enable-gtk: false
            enable-qt: qt6
            enable-tests: true
            enabled: ${{ needs.what-to-make.outputs.tidy-qt }}
            regex: '(qt|tests/qt)/.*'
            runner: ubuntu-latest
    steps:
      - name: Show Configuration
        run: |
          echo '${{ toJSON(matrix) }}'
          echo '${{ toJSON(runner) }}'
          cat /etc/os-release
      - name: Get Source
        if: matrix.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Get Dependencies
        if: matrix.enabled == 'true'
        uses: ./.github/actions/install-deps
        with:
          compiler: clang
          enable-clang-tidy: true
          use-sudo: true
          enable-gtk: ${{ matrix.enable-gtk }}
          enable-qt: ${{ matrix.enable-qt }}
      - name: Configure
        if: matrix.enabled == 'true'
        run: |
          cmake \
            -S . \
            -B obj \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER='clang++' \
            -DCMAKE_C_COMPILER='clang' \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_INSTALL_PREFIX=pfx \
            -DENABLE_GTK=${{ matrix.enable-gtk && 'ON' || 'OFF' }} \
            -DENABLE_QT=${{ matrix.enable-qt && 'ON' || 'OFF' }} \
            -DENABLE_TESTS=${{ matrix.enable-tests && 'ON' || 'OFF' }} \
            -DRUN_CLANG_TIDY=OFF \
            -DUSE_SYSTEM_DEFAULT=ON \
            -DUSE_SYSTEM_FMT=${{ matrix.toolkit == 'gtk4' && 'OFF' || 'ON' }} `# TODO: remove this line when fmt>10 or clang>20` \
            -DUSE_SYSTEM_DHT=OFF `# Not packaged in Ubuntu` \
            -DUSE_SYSTEM_SIGSLOT=OFF `# Not packaged in Ubuntu` \
            -DUSE_SYSTEM_SMALL=OFF `# Not packaged in Ubuntu` \
            -DUSE_SYSTEM_UTP=OFF `# Not packaged in Ubuntu` \
            -DUSE_SYSTEM_WIDE_INTEGER=OFF `# Not packaged in Ubuntu`
      - name: Generate sources
        if: matrix.enabled == 'true'
        run: |
          # clang-tidy parses each changed TU fully, so its headers must exist
          # even though we never build the main targets. Build the Qt *_autogen
          # headers and the bundled ExternalProject libs whose installed headers
          # (e.g. dht/dht.h) only appear once their `_<lib>` target is built.
          mapfile -t targets < <(
            ninja -C obj -t targets all 2>/dev/null \
              | sed -n -e 's/^\([^:]*_autogen\):.*/\1/p' -e 's/^\(_[A-Za-z0-9_]*\): phony$/\1/p' \
              | sort -u)
          if [ "${#targets[@]}" -gt 0 ]; then
            cmake --build obj --target "${targets[@]}"
          fi
      - name: Run clang-tidy
        if: matrix.enabled == 'true'
        uses: ./.github/actions/clang-tidy-diff
        with:
          build-path: obj
          regex: ${{ matrix.regex }}
          clang-tidy-binary: clang-tidy-22
          full-run: ${{ needs.what-to-make.outputs.tidy-everything }}
          extra-arg: '-DFMT_USE_CONSTEVAL=0'

  clang-tidy-windows:
    runs-on: windows-2025
    needs: what-to-make
    if: |
      needs.what-to-make.outputs.tidy-core == 'true' ||
      needs.what-to-make.outputs.tidy-qt == 'true'
    # MSVC + Qt6 coverage. qt5 on Windows is intentionally omitted for now: it
    # would require building Qt5 from source on the runners (see
    # prepare-deps-win32 / release/windows). Linux covers qt5.
    strategy:
      fail-fast: false
      matrix:
        toolkit: [core, qt6]
        include:
          - toolkit: core
            deps: CoreDeps
            enable-qt: 'OFF'
            enabled: ${{ needs.what-to-make.outputs.tidy-core }}
            regex: '(libtransmission|libtransmission-app|tests/libtransmission)/.*'
          - toolkit: qt6
            deps: Deps
            enable-qt: 'ON'
            enabled: ${{ needs.what-to-make.outputs.tidy-qt }}
            regex: '(qt|tests/qt)/.*'
    steps:
      - name: Show Configuration
        run: |
          echo '${{ toJSON(matrix) }}'
          echo '${{ toJSON(runner) }}'
      - name: Get Source
        if: matrix.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Prepare Build Deps
        if: matrix.enabled == 'true'
        uses: ./.github/actions/prepare-deps-win32
        with:
          arch: x64
          type: ${{ matrix.deps }}
      - name: Setup Visual Studio Environment
        if: matrix.enabled == 'true'
        uses: ./.github/actions/setup-vs-env-win32
        with:
          arch: x64
      - name: Configure
        if: matrix.enabled == 'true'
        run: |
          $CmakeArgs = @(
            '-S .'
            '-B obj'
            '-G Ninja'
            '-DCMAKE_BUILD_TYPE=Debug'
            '-DCMAKE_EXPORT_COMPILE_COMMANDS=ON'
            "-DCMAKE_PREFIX_PATH=`"$Env:DEPS_PREFIX`""
            '-DENABLE_QT=${{ matrix.enable-qt }}'
            '-DENABLE_TESTS=ON'
            '-DRUN_CLANG_TIDY=OFF'
            '-DUSE_SYSTEM_DEFAULT=OFF'
          )
          cmd /c "`"$Env:VCVARSALL`" $Env:VC_ARCH >nul && cmake $($CmakeArgs -join ' ')"
      - name: Generate sources
        if: matrix.enabled == 'true'
        run: |
          # Like the Linux job, but USE_SYSTEM_DEFAULT=OFF bundles every lib, so
          # build the Qt *_autogen headers plus all `_*` ExternalProject targets
          # (e.g. _dht) to install headers like dht/dht.h before clang-tidy runs.
          $list = cmd /c "`"$Env:VCVARSALL`" $Env:VC_ARCH >nul && ninja -C obj -t targets all"
          $targets = $list |
            ForEach-Object {
              if ($_ -match '^([^:]+_autogen):') { $Matches[1] }
              elseif ($_ -match '^(_[A-Za-z0-9_]+): phony$') { $Matches[1] }
            } |
            Sort-Object -Unique
          if ($targets) {
            cmd /c "`"$Env:VCVARSALL`" $Env:VC_ARCH >nul && cmake --build obj --target $($targets -join ' ')"
          }
      - name: Run clang-tidy
        if: matrix.enabled == 'true'
        uses: ./.github/actions/clang-tidy-diff
        with:
          build-path: obj
          regex: ${{ matrix.regex }}
          clang-tidy-binary: clang-tidy
