name: Save and supersede cache snapshot
description: >
  Save a replacement cache snapshot, verify it is visible, then delete older
  refs/heads/main entries whose key starts with `prefix`.
inputs:
  path:
    description: Files or directories to cache
    required: true
  key:
    description: Exact key for the replacement snapshot
    required: true
  prefix:
    description: Cache-key prefix selecting the snapshot family
    required: true
runs:
  using: composite
  steps:
    - name: Save replacement snapshot
      uses: actions/cache/save@v5
      with:
        path: ${{ inputs.path }}
        key: ${{ inputs.key }}
    - name: Delete superseded snapshots
      uses: actions/github-script@v8
      env:
        PREFIX: ${{ inputs.prefix }}
        KEEP: ${{ inputs.key }}
      with:
        script: |
          const caches = await github.paginate(github.rest.actions.getActionsCacheList, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            key: process.env.PREFIX,
            ref: 'refs/heads/main',
            per_page: 100,
          });
          if (!caches.some(cache => cache.key === process.env.KEEP)) {
            core.warning(`replacement ${process.env.KEEP} is not visible; keeping superseded snapshots`);
            return;
          }
          for (const cache of caches) {
            if (cache.key === process.env.KEEP) {
              continue;
            }
            core.info(`deleting ${cache.key} (${(cache.size_in_bytes / 1048576).toFixed(1)} MB)`);
            await github.rest.actions.deleteActionsCacheById({
              owner: context.repo.owner,
              repo: context.repo.repo,
              cache_id: cache.id,
            });
          }
